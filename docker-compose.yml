services:
  mysql:
    container_name: mysql-shared
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - shared-net

  redis:
    container_name: redis-shared
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - shared-net

volumes:
  mysql-data:
  redis-data:

networks:
  shared-net:
    name: shared-net